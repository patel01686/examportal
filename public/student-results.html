<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Results | Exam Portal</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 30px;
    }

    h1 {
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 i {
      color: #667eea;
      font-size: clamp(24px, 5vw, 32px);
    }

    .back-btn {
      background: white;
      border: 2px solid #667eea;
      color: #667eea;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .back-btn:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .table-responsive {
      overflow-x: auto;
      border-radius: 12px;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      min-width: 600px;
    }

    th {
      background: #f8f9fa;
      color: #333;
      font-weight: 600;
      font-size: 14px;
      padding: 16px 12px;
      text-align: left;
      border-bottom: 2px solid #e9ecef;
    }

    td {
      padding: 14px 12px;
      font-size: 14px;
      color: #555;
      border-bottom: 1px solid #e9ecef;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background-color: #f8f9fa;
    }

    .message {
      text-align: center;
      margin-top: 20px;
      font-weight: 500;
      padding: 20px;
      border-radius: 8px;
      background: #f8f9fa;
      color: #666;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .message i {
      font-size: 48px;
      color: #ddd;
    }

    /* Color coding for stats */
    .correct { color: #28a745; font-weight: 500; }
    .wrong { color: #dc3545; font-weight: 500; }
    .skipped { color: #ffc107; font-weight: 500; }
    .score { font-weight: 600; color: #667eea; }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-chart-line"></i> Student Exam Results</h1>
    <button class="back-btn" onclick="location.href='admin-students.html'"><i class="fas fa-arrow-left"></i> Back to Students</button>
    <div class="table-responsive">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Exam</th>
            <th>Correct</th>
            <th>Wrong</th>
            <th>Skipped</th>
            <th>Score (%)</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="message" class="message"></div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token || role !== 'admin') {
      window.location.href = 'login.html';
    }

    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get('studentId');
    if (!studentId) {
      alert('No student selected');
      window.location.href = 'admin-students.html';
    }

    async function loadResults() {
      const tbody = document.querySelector('#resultsTable tbody');
      const messageEl = document.getElementById('message');
      try {
        const res = await fetch(`/api/admin/students/${studentId}/results`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 404) {
          messageEl.innerHTML = '<i class="fas fa-search"></i> No results found for this student.';
          tbody.innerHTML = '';
          return;
        }
        const results = await res.json();
        tbody.innerHTML = '';
        if (results.length === 0) {
          messageEl.innerHTML = '<i class="fas fa-folder-open"></i> No exam results yet.';
          return;
        }
        messageEl.innerHTML = '';
        results.forEach(r => {
          const row = tbody.insertRow();
          row.innerHTML = `
            <td><i class="fas fa-pencil-alt" style="color: #667eea; margin-right: 6px;"></i>${r.examId?.title || 'N/A'}</td>
            <td class="correct">${r.correct}</td>
            <td class="wrong">${r.wrong}</td>
            <td class="skipped">${r.skipped}</td>
            <td class="score">${r.score.toFixed(2)}%</td>
            <td>${new Date(r.createdAt).toLocaleString()}</td>
          `;
        });
      } catch (err) {
        console.error(err);
        messageEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Error loading results.';
      }
    }

    loadResults();
  </script>
</body>
</html>

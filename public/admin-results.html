<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Results | Exam Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 30px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 30px;
    }

    h1 {
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 i {
      color: #667eea;
      font-size: clamp(24px, 5vw, 32px);
    }

    .back-btn {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 50px;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 25px;
    }

    .back-btn:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    /* Table wrapper for horizontal scroll on small screens */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #f0f0f0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 900px; /* ensures table doesn't squish on large screens */
    }

    th {
      background: #f8f9fa;
      color: #555;
      font-weight: 600;
      padding: 16px 12px;
      text-align: left;
      white-space: nowrap;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #f0f0f0;
      color: #444;
    }

    tr:hover td {
      background-color: #f5f7ff;
    }

    .view-btn {
      background: #2196F3;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .view-btn:hover {
      background: #0b7dda;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
    }

    .view-btn i {
      font-size: 12px;
    }

    .message {
      text-align: center;
      margin-top: 20px;
      font-weight: 500;
      padding: 15px;
      border-radius: 8px;
    }

    .message.info {
      background: #d1ecf1;
      color: #0c5460;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
      font-style: italic;
    }

    .empty-state i {
      font-size: 48px;
      color: #ddd;
      margin-bottom: 10px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <i class="fas fa-chart-bar"></i> 
      All Exam Results
    </h1>
    <button class="back-btn" onclick="location.href='admin-dashboard.html'"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>

    <div class="table-wrapper">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Student</th>
            <th>Email</th>
            <th>Exam</th>
            <th>Correct</th>
            <th>Wrong</th>
            <th>Skipped</th>
            <th>Score (%)</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div id="message" class="message"></div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token || localStorage.getItem('role') !== 'admin') {
      window.location.href = 'login.html';
    }

    async function loadResults() {
      const res = await fetch('/api/admin/results', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const results = await res.json();
      const tbody = document.querySelector('#resultsTable tbody');
      const messageEl = document.getElementById('message');
      tbody.innerHTML = '';

      if (results.length === 0) {
        messageEl.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><br>No results yet.</div>';
        return;
      } else {
        messageEl.innerHTML = '';
      }

      results.forEach(r => {
        const row = tbody.insertRow();
        row.innerHTML = `
          <td>${r.studentId?.name || 'N/A'}</td>
          <td>${r.studentId?.email || 'N/A'}</td>
          <td>${r.examId?.title || 'N/A'}</td>
          <td>${r.correct}</td>
          <td>${r.wrong}</td>
          <td>${r.skipped}</td>
          <td>${r.score.toFixed(2)}</td>
          <td>${new Date(r.createdAt).toLocaleString()}</td>
          <td><button class="view-btn" onclick="viewStudentResults('${r.studentId?._id}')"><i class="fas fa-eye"></i> View</button></td>
        `;
      });
    }

    function viewStudentResults(studentId) {
      if (!studentId) {
        alert('Student ID not available');
        return;
      }
      window.location.href = `student-results.html?studentId=${studentId}`;
    }

    loadResults();
  </script>
</body>
</html>

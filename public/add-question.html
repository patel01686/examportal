<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Question | Exam Portal</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome (optional, for icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 40px 35px;
    }

    h2 {
      font-size: 28px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h2 i {
      color: #667eea;
      font-size: 28px;
    }

    .subtitle {
      color: #777;
      font-size: 14px;
      margin-bottom: 30px;
      border-left: 4px solid #667eea;
      padding-left: 15px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      margin-top: 15px;
    }

    label:first-of-type {
      margin-top: 0;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      font-family: 'Poppins', sans-serif;
      background: #fafafa;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      background: white;
    }

    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 16px;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.2s;
      margin-top: 30px;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    button:active {
      transform: scale(0.98);
    }

    .message {
      text-align: center;
      margin-top: 20px;
      font-weight: 500;
      padding: 10px;
      border-radius: 8px;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 25px 20px;
      }
      h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>
      <i class="fas fa-plus-circle"></i> 
      Add Question
    </h2>
    <div class="subtitle">Fill in the question details and select the correct answer</div>
    <form id="questionForm">
      <label for="examId"><i class="fas fa-pencil-alt" style="margin-right: 6px;"></i>Select Exam</label>
      <select id="examId" required>
        <option value="">-- Choose an exam --</option>
      </select>

      <label for="question"><i class="fas fa-question-circle"></i> Question Text</label>
      <textarea id="question" placeholder="Enter your question here..." required></textarea>

      <label for="optionA"><i class="fas fa-tag"></i> Option A</label>
      <input type="text" id="optionA" placeholder="Option A" required>

      <label for="optionB"><i class="fas fa-tag"></i> Option B</label>
      <input type="text" id="optionB" placeholder="Option B" required>

      <label for="optionC"><i class="fas fa-tag"></i> Option C</label>
      <input type="text" id="optionC" placeholder="Option C" required>

      <label for="optionD"><i class="fas fa-tag"></i> Option D</label>
      <input type="text" id="optionD" placeholder="Option D" required>

      <label for="correctAnswer"><i class="fas fa-check-circle"></i> Correct Answer</label>
      <select id="correctAnswer" required>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>

      <button type="submit"><i class="fas fa-save"></i> Add Question</button>
    </form>
    <p id="message" class="message"></p>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token || localStorage.getItem('role') !== 'admin') {
      window.location.href = 'login.html';
    }

    async function loadExams() {
      try {
        const res = await fetch('/api/exams', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const exams = await res.json();
        const select = document.getElementById('examId');
        exams.forEach(exam => {
          const option = document.createElement('option');
          option.value = exam._id;
          option.textContent = exam.title; // Only the exam title is shown
          select.appendChild(option);
        });
      } catch (err) {
        console.error('Failed to load exams', err);
      }
    }
    loadExams();

    document.getElementById('questionForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const questionData = {
        question: document.getElementById('question').value,
        optionA: document.getElementById('optionA').value,
        optionB: document.getElementById('optionB').value,
        optionC: document.getElementById('optionC').value,
        optionD: document.getElementById('optionD').value,
        correctAnswer: document.getElementById('correctAnswer').value
      };
      
      const examId = document.getElementById('examId').value;
      const messageEl = document.getElementById('message');
      messageEl.className = 'message';
      
      const res = await fetch(`/api/exams/${examId}/questions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(questionData)
      });
      
      const data = await res.json();
      if (res.ok) {
        messageEl.innerHTML = '✅ Question added successfully!';
        messageEl.classList.add('success');
        document.getElementById('questionForm').reset();
      } else {
        messageEl.innerHTML = '❌ ' + (data.msg || 'Error adding question');
        messageEl.classList.add('error');
      }
    });
  </script>
</body>
</html>

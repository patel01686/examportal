<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Password | Exam Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 {
      color: #333;
      margin-bottom: 10px;
    }
    .exam-title {
      color: #667eea;
      font-weight: 600;
      margin-bottom: 25px;
    }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 20px;
      outline: none;
      transition: 0.3s;
    }
    input:focus {
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }
    .error {
      color: #e74c3c;
      margin-top: 15px;
      font-size: 14px;
    }
    .back-link {
      margin-top: 20px;
    }
    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <i class="fas fa-lock" style="font-size: 48px; color: #667eea; margin-bottom: 15px;"></i>
    <h2>Exam Protected</h2>
    <p class="exam-title" id="examTitle"></p>
    <input type="password" id="password" placeholder="Enter exam password" autofocus>
    <button onclick="verifyPassword()"><i class="fas fa-arrow-right"></i> Start Exam</button>
    <div id="error" class="error"></div>
    <div class="back-link">
      <a href="student-dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
  </div>
  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token || role !== 'student') window.location.href = 'login.html';

    const urlParams = new URLSearchParams(window.location.search);
    const examId = urlParams.get('examId');
    let exam = null;

    async function loadExam() {
      const res = await fetch(`/api/student/exam/${examId}/start`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      exam = data.exam;
      document.getElementById('examTitle').innerText = exam.title;
      
      // Agar password nahi hai to seedha instructions page par bhejo
      if (!exam.password) {
        window.location.href = `exam-instructions.html?examId=${examId}`;
      }
    }

    async function verifyPassword() {
      const password = document.getElementById('password').value;
      if (!password) {
        document.getElementById('error').innerText = 'Please enter password';
        return;
      }
      
      const res = await fetch(`/api/student/exam/${examId}/verify-password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = `exam-instructions.html?examId=${examId}`;
      } else {
        document.getElementById('error').innerText = data.msg || 'Wrong password';
      }
    }

    loadExam();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Exam | Exam Portal</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    nav {
      width: 100%;
      max-width: 1200px;
      background: white;
      border-radius: 50px;
      padding: 12px 25px;
      margin-bottom: 30px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 15px 25px;
    }

    nav a {
      color: #333;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: color 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    nav a i {
      color: #667eea;
      font-size: 16px;
    }

    nav a:hover {
      color: #667eea;
    }

    nav a:last-child {
      background: #f44336;
      color: white;
      padding: 6px 16px;
      border-radius: 30px;
      transition: background 0.3s;
    }

    nav a:last-child:hover {
      background: #d32f2f;
    }

    .container {
      width: 100%;
      max-width: 550px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 40px 35px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 i {
      color: #667eea;
      font-size: 28px;
    }

    .subtitle {
      color: #777;
      font-size: 14px;
      margin-bottom: 30px;
      border-left: 4px solid #667eea;
      padding-left: 15px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      margin-top: 15px;
    }

    label:first-of-type {
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      font-family: 'Poppins', sans-serif;
      background: #fafafa;
    }

    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      background: white;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.2s;
      margin-top: 30px;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    button:active {
      transform: scale(0.98);
    }

    .message {
      text-align: center;
      margin-top: 20px;
      font-weight: 500;
      padding: 12px;
      border-radius: 8px;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
    }

    /* Responsive */
    @media (max-width: 600px) {
      nav {
        border-radius: 20px;
        padding: 12px 20px;
      }
      .container {
        padding: 30px 20px;
      }
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="create-exam.html"><i class="fas fa-plus-circle"></i> Create Exam</a>
    <a href="add-question.html"><i class="fas fa-question-circle"></i> Add Question</a>
    <a href="admin-students.html"><i class="fas fa-users"></i> Manage Students</a>
    <a href="admin-results.html"><i class="fas fa-chart-bar"></i> View Results</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </nav>

  <div class="container">
    <h1>
      <i class="fas fa-edit"></i> 
      Edit Exam
    </h1>
    <div class="subtitle">Update the exam details below</div>
    <form id="editExamForm">
      <input type="hidden" id="examId">
      <label for="title"><i class="fas fa-heading" style="margin-right: 6px;"></i>Exam Title</label>
      <input type="text" id="title" placeholder="e.g. Mathematics Final" required>

      <label for="duration"><i class="fas fa-clock"></i> Duration (minutes)</label>
      <input type="number" id="duration" placeholder="60" min="1" required>

      <label for="totalQuestions"><i class="fas fa-list-ol"></i> Total Questions</label>
      <input type="number" id="totalQuestions" placeholder="20" min="1" required>

      <label for="marksPerQuestion"><i class="fas fa-star"></i> Marks Per Question</label>
      <input type="number" id="marksPerQuestion" placeholder="1" min="1" required>

      <button type="submit"><i class="fas fa-save"></i> Update Exam</button>
    </form>
    <p id="message" class="message"></p>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token || role !== 'admin') window.location.href = 'login.html';

    const urlParams = new URLSearchParams(window.location.search);
    const examId = urlParams.get('id');
    if (!examId) {
      alert('No exam ID provided');
      window.location.href = 'admin-dashboard.html';
    }

    async function loadExam() {
      try {
        const res = await fetch('/api/exams', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const exams = await res.json();
        const exam = exams.find(e => e._id === examId);
        if (exam) {
          document.getElementById('examId').value = exam._id;
          document.getElementById('title').value = exam.title;
          document.getElementById('duration').value = exam.duration;
          document.getElementById('totalQuestions').value = exam.totalQuestions;
          document.getElementById('marksPerQuestion').value = exam.marksPerQuestion;
        } else {
          alert('Exam not found');
          window.location.href = 'admin-dashboard.html';
        }
      } catch (err) {
        console.error(err);
        alert('Error loading exam');
      }
    }

    document.getElementById('editExamForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const examData = {
        title: document.getElementById('title').value,
        duration: parseInt(document.getElementById('duration').value),
        totalQuestions: parseInt(document.getElementById('totalQuestions').value),
        marksPerQuestion: parseInt(document.getElementById('marksPerQuestion').value)
      };
      const msgEl = document.getElementById('message');
      msgEl.className = 'message';
      try {
        const res = await fetch(`/api/exams/${examId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(examData)
        });
        const data = await res.json();
        if (res.ok) {
          msgEl.innerHTML = '<i class="fas fa-check-circle"></i> Exam updated successfully!';
          msgEl.classList.add('success');
        } else {
          msgEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (data.msg || 'Error updating exam');
          msgEl.classList.add('error');
        }
      } catch (err) {
        msgEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Network error';
        msgEl.classList.add('error');
      }
    });

    function logout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }

    loadExam();
  </script>
</body>
</html>
